services:
  - type: web
    name: ai-trading-mentor-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEYS
        sync: false # Requires manual entry in Render dashboard
